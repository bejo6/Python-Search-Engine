version: "3.8"

# ┌────────────────────────────────────────────┐
# │  SearXNG Private Instance (Docker)         │
# │                                            │
# │  Edit settings.yml dan Caddyfile DULU      │
# │  sebelum menjalankan docker compose        │
# └────────────────────────────────────────────┘

services:
  # ─── SearXNG Core ───
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    # Don't expose ports publicly; Caddy handles it
    expose:
      - "8080"
    volumes:
      # Mount custom settings
      - ./settings.yml:/etc/searxng/settings.yml:ro
      # Persistent data (optional, untuk stats/cache)
      - searxng_data:/data
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
      # Disable default rate limiter (Caddy handles auth)
      - UWSGI_LAZY_APPS=true
      - UWSGI_WORKERS=4
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - searxng_net

  # ─── Caddy: Reverse Proxy + HTTPS + Auth ───
  caddy:
    image: caddy:2-alpine
    container_name: searxng-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      searxng:
        condition: service_healthy

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  searxng_data:
  caddy_data:
  caddy_config:

networks:
  searxng_net:
    driver: bridge
