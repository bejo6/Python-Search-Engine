# ╔══════════════════════════════════════════════════════════╗
# ║  SearXNG Configuration - Private Instance               ║
# ║                                                           ║
# ║  Edit these:                                             ║
# ║  1. server.secret_key  ->  openssl rand -hex 32          ║
# ║  2. domains.google   ->  set if needed                   ║
# ║  3. engines section  ->  enable/disable engines          ║
# ╚══════════════════════════════════════════════════════════╝

general:
  debug: false
  instance_name: "Private Search"
  # Open search on homepage without keyword
  enable_metrics: false

use_default_settings: true

# ─── Server ───
server:
  # IMPORTANT: Generate with: openssl rand -hex 32
  secret_key: "CHANGE_ME_REPLACE_WITH_64_HEX_CHARS"

  # Disable built-in rate limiter (Caddy handles auth/rate limiting)
  limiter: false

  # Allow JSON API access via GET (for programmatic access)
  method: "GET"

  # Image proxy to avoid leaking user IP to image hosts
  image_proxy: true

  default_locale: "en"
  default_timezone: "UTC"

  # Default search categories
  default_categories:
    - general
    - web
    - it
    - science
    - news

  # Default engines (these will be auto-enabled alongside use_default_settings)
  engines:
    # ─── Major Search ───
    - name: google
      engine: google
      shortcut: g
      disabled: false

    - name: bing
      engine: bing
      shortcut: b
      disabled: false

    - name: duckduckgo
      engine: duckduckgo
      shortcut: ddg
      disabled: false

    - name: brave
      engine: brave
      shortcut: br
      disabled: false

    - name: startpage
      engine: startpage
      shortcut: sp
      disabled: false

    - name: yahoo
      engine: yahoo
      shortcut: yh
      disabled: false

    # ─── Privacy / Independent ───
    - name: mojeek
      engine: mojeek
      shortcut: mk
      disabled: false

    - name: ecosia
      engine: ecosia
      shortcut: ec
      disabled: false

    - name: wikipedia
      engine: wikipedia
      shortcut: wp
      disabled: false

    - name: wikidata
      engine: wikidata
      shortcut: wd
      disabled: false

    # ─── Tech / Dev ───
    - name: github
      engine: github
      shortcut: gh
      disabled: false

    - name: stackoverflow
      engine: stackoverflow
      shortcut: st
      disabled: false

    - name: hackernews
      engine: hackernews
      shortcut: hn
      disabled: false

    - name: docker hub
      engine: docker hub
      shortcut: dh
      disabled: false

    # ─── Academic ───
    - name: arxiv
      engine: arxiv
      shortcut: arx
      disabled: false

    - name: google scholar
      engine: google_scholar
      shortcut: gs
      disabled: false

    - name: crossref
      engine: crossref
      shortcut: cr
      disabled: false

    # ─── Media ───
    - name: youtube
      engine: youtube
      shortcut: yt
      disabled: false

    - name: dailymotion
      engine: dailymotion
      shortcut: dm
      disabled: false

    - name: vimeo
      engine: vimeo
      shortcut: vm
      disabled: false

    - name: flickr
      engine: flickr
      shortcut: fl
      disabled: false

    # ─── Disabled by default (high error rate or slow) ───
    # - name: yandex
    #   engine: yandex
    #   shortcut: ya
    #   disabled: true

# ─── Search ───
search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "auto"
  formats:
    - html
    - json

# ─── Outgoing (Proxy optional) ───
outgoing:
  # Enable if you want to use a proxy for engine requests
  # proxy: "http://127.0.0.1:3128"
  request_timeout: 6.0
  max_request_timeout: 15.0
  pool_connections: 100
  pool_maxsize: 20
  retries: 2

# ─── UI ───
ui:
  static_use_hash: true
  cachebuster: true
  default_theme: simple
  query_in_title: true

# ─── Result Proxying ───
result_proxy:
  # Enable if you want to proxy result links (hides referrer)
  url: ""  # Set to http://result-proxy:8080 if you deploy one
