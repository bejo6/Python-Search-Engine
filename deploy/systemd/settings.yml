# ╔══════════════════════════════════════════════════════════╗
# ║  SearXNG Settings - Non-Docker (systemd) Deployment      ║
# ║                                                           ║
# ║  File ini akan di-override oleh install.sh kecuali       ║
# ║  sudah ada di /opt/searxng/settings.yml                   ║
# ║                                                           ║
# ║  PENTING: Ganti secret_key dengan: openssl rand -hex 32  ║
# ╚══════════════════════════════════════════════════════════╝

general:
  debug: false
  instance_name: "Private Search"
  enable_metrics: false

use_default_settings: true

server:
  # Generate: openssl rand -hex 32
  secret_key: "CHANGE_ME_REPLACE_WITH_64_HEX_CHARS"

  # Disable rate limiter (Caddy handles auth externally)
  limiter: false

  # Allow JSON API via GET (untuk programmatic access)
  method: "GET"

  # Proxy gambar supaya IP user tidak bocor
  image_proxy: true

search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "auto"
  formats:
    - html
    - json

# Engines penting — set semua ke disabled: false
engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: brave
    engine: brave
    shortcut: br
    disabled: false

  - name: startpage
    engine: startpage
    shortcut: sp
    disabled: false

  - name: yahoo
    engine: yahoo
    shortcut: yh
    disabled: false

  - name: mojeek
    engine: mojeek
    shortcut: mk
    disabled: false

  - name: ecosia
    engine: ecosia
    shortcut: ec
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

  - name: github
    engine: github
    shortcut: gh
    disabled: false

  - name: hackernews
    engine: hackernews
    shortcut: hn
    disabled: false

  - name: arxiv
    engine: arxiv
    shortcut: arx
    disabled: false

outgoing:
  request_timeout: 6.0
  max_request_timeout: 15.0
  pool_connections: 100
  pool_maxsize: 20
  retries: 2

ui:
  static_use_hash: true
  cachebuster: true
  default_theme: simple
